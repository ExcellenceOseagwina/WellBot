<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify Email | Wellspring Student Assistant</title>
    <link rel="icon" href="assets/icons/android-chrome-192x192.png" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-page="verify">
    <div class="app-shell">
      <header class="topbar">
        <nav class="nav">
          <a class="brand" href="index.html">
            <img src="assets/images/logo.png" alt="Wellspring University logo" />
            <span>Wellspring University</span>
          </a>
          <div class="nav-links">
            <a data-nav href="index.html">Home</a>
            <a data-nav href="about.html">About</a>
            <a data-nav href="history.html">History</a>
            <a data-nav href="login.html">Login</a>
            <button class="theme-toggle" type="button" data-theme-toggle>Dark</button>
          </div>
        </nav>
      </header>

      <main class="auth-wrap">
        <div id="verifyPending" class="form-card" hidden>
          <h1>Check your email</h1>
          <p class="muted">We sent a verification link to <strong id="pendingEmail"></strong>. Click the link in the email to activate your account.</p>
          <div id="pendingMessage" class="form-message" role="status"></div>
          <form id="resendForm">
            <label for="resendEmail">Didn't receive it?</label>
            <input id="resendEmail" name="email" type="email" autocomplete="email" required />
            <button class="button" type="submit">Resend verification email</button>
          </form>
          <p class="muted"><a href="login.html">Back to login</a></p>
        </div>

        <div id="verifyToken" class="form-card" hidden>
          <h1>Verifying email...</h1>
          <div id="verifyMessage" class="form-message" role="status">Please wait while we verify your email.</div>
        </div>
      </main>
      <footer class="footer">Wellspring University Student Assistant</footer>
    </div>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
