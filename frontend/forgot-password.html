<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | Wellspring Student Assistant</title>
    <link rel="icon" href="assets/icons/android-chrome-192x192.png" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-page="forgot">
    <div class="app-shell">
      <header class="topbar">
        <nav class="nav">
          <a class="brand" href="index.html">
            <img src="assets/images/logo.png" alt="Wellspring University logo" />
            <span>Wellspring University</span>
          </a>
          <div class="nav-links">
            <a data-nav href="index.html">Home</a>
            <a data-nav href="about.html">About</a>
            <a data-nav href="history.html">History</a>
            <a data-nav href="login.html">Login</a>
            <button class="theme-toggle" type="button" data-theme-toggle>Dark</button>
          </div>
        </nav>
      </header>

      <main class="auth-wrap">
        <form id="forgotForm" class="form-card">
          <h1>Forgot password</h1>
          <p class="muted">Enter the email linked to your student account. We'll send you a reset link.</p>

          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" required />

          <div id="formMessage" class="form-message" role="status"></div>
          <button class="button" type="submit">Send reset link</button>
          <p class="muted"><a href="login.html">Back to login</a></p>
        </form>
      </main>
      <footer class="footer">Wellspring University Student Assistant</footer>
    </div>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
