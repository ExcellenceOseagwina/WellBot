<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | Wellspring Student Assistant</title>
    <link rel="icon" href="assets/icons/android-chrome-192x192.png" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-page="reset">
    <div class="app-shell">
      <header class="topbar">
        <nav class="nav">
          <a class="brand" href="index.html">
            <img src="assets/images/logo.png" alt="Wellspring University logo" />
            <span>Wellspring University</span>
          </a>
          <div class="nav-links">
            <a data-nav href="index.html">Home</a>
            <a data-nav href="about.html">About</a>
            <a data-nav href="history.html">History</a>
            <a data-nav href="login.html">Login</a>
            <button class="theme-toggle" type="button" data-theme-toggle>Dark</button>
          </div>
        </nav>
      </header>

      <main class="auth-wrap">
        <form id="resetForm" class="form-card">
          <h1>Set new password</h1>
          <p class="muted">Choose a new password for your account.</p>

          <label for="password">New password</label>
          <div class="password-field">
            <input id="password" name="password" type="password" minlength="6" autocomplete="new-password" required />
            <button class="password-toggle" type="button" data-password-toggle="#password" aria-label="Show password">Show</button>
          </div>

          <label for="confirmPassword">Confirm password</label>
          <div class="password-field">
            <input id="confirmPassword" name="confirmPassword" type="password" minlength="6" autocomplete="new-password" required />
            <button class="password-toggle" type="button" data-password-toggle="#confirmPassword" aria-label="Show password">Show</button>
          </div>

          <div id="formMessage" class="form-message" role="status"></div>
          <button class="button" type="submit">Reset password</button>
          <p class="muted"><a href="login.html">Back to login</a></p>
        </form>
      </main>
      <footer class="footer">Wellspring University Student Assistant</footer>
    </div>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
