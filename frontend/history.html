<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>History | Wellspring Student Assistant</title>
    <link rel="icon" href="assets/icons/android-chrome-192x192.png" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <nav class="nav">
          <a class="brand" href="home.html">
            <img src="assets/images/logo.png" alt="Wellspring University logo" />
            <span>Wellspring University</span>
          </a>
          <div class="nav-links">
            <a data-nav href="home.html">Home</a>
            <a data-nav href="about.html">About</a>
            <a data-nav href="chatbot.html">Chatbot</a>
            <a data-nav href="history.html">History</a>
            <button class="button danger" type="button" data-logout>Logout</button>
            <button class="theme-toggle" type="button" data-theme-toggle>Dark</button>
          </div>
        </nav>
      </header>

      <main class="history-page">
        <section class="history-shell">
          <div class="history-heading">
            <div>
              <h1>Conversation history</h1>
              <p class="muted">Review previous questions, answers, confidence scores, and categories.</p>
            </div>
            <a class="button" href="chatbot.html">Back to chatbot</a>
          </div>
          <div id="historyList" class="history-list full"></div>
        </section>
      </main>
    </div>
    <script src="js/app.js"></script>
    <script src="js/history.js"></script>
  </body>
</html>
