<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot | Wellspring Student Assistant</title>
    <link rel="icon" href="assets/icons/android-chrome-192x192.png" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <nav class="nav">
          <a class="brand" href="home.html">
            <img src="assets/images/logo.png" alt="Wellspring University logo" />
            <span>Wellspring University</span>
          </a>
          <button class="menu-toggle" type="button" data-mobile-menu aria-label="Open navigation menu" aria-expanded="false" aria-controls="navLinks">
            <span></span>
            <span></span>
            <span></span>
          </button>
          <div class="nav-links" id="navLinks" data-nav-links>
            <a data-nav href="home.html">Home</a>
            <a data-nav href="about.html">About</a>
            <a data-nav href="chatbot.html">Chatbot</a>
            <a data-nav href="history.html">History</a>
            <button class="button danger" type="button" data-logout>Logout</button>
            <button class="theme-toggle" type="button" data-theme-toggle>Dark</button>
          </div>
        </nav>
      </header>

      <main class="chat-page">
        <div class="chat-layout single">
          <section class="chat-panel" aria-label="Student assistant chatbot">
            <div class="chat-header">
              <div>
                <h1>Ask the assistant</h1>
                <p class="muted">Signed in as <strong id="studentName">Student</strong></p>
              </div>
              <a class="button secondary" href="history.html">View history</a>
            </div>
            <div id="messages" class="messages" aria-live="polite"></div>
            <form id="chatForm" class="chat-form">
              <textarea id="questionInput" placeholder="Ask a Wellspring University question..." required></textarea>
              <button class="button" type="submit">Send</button>
            </form>
          </section>
        </div>
      </main>
      <footer class="footer">Wellspring University Student Assistant</footer>
    </div>
    <script src="js/app.js"></script>
    <script src="js/chatbot.js"></script>
  </body>
</html>
