<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Wellspring Student Assistant</title>
    <link rel="icon" href="assets/icons/favicon.ico" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-page="login">
    <div class="app-shell">
      <header class="topbar">
        <nav class="nav">
          <a class="brand" href="index.html">
            <img src="assets/images/logo.png" alt="Wellspring University logo" />
            <span>Wellspring University</span>
          </a>
          <div class="nav-links">
            <a data-nav href="index.html">Home</a>
            <a data-nav href="about.html">About</a>
            <a data-nav href="chatbot.html">Chatbot</a>
            <a data-nav href="signup.html">Sign up</a>
          </div>
        </nav>
      </header>

      <main class="auth-wrap">
        <form id="loginForm" class="form-card">
          <h1>Student login</h1>
          <p class="muted">Login using your matric number and password.</p>

          <label for="matricNumber">Matric number</label>
          <input id="matricNumber" name="matricNumber" autocomplete="off" required />

          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />

          <div id="formMessage" class="form-message" role="status"></div>
          <button class="button" type="submit">Login</button>
          <p class="muted"><a href="reset-password.html">Forgot password?</a></p>
        </form>
      </main>
      <footer class="footer">Wellspring University Student Assistant</footer>
    </div>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
